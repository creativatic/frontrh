# Nginx interno del contenedor frontend (no es el nginx-reverse-proxy del stack).
# Sirve la SPA Angular: cualquier ruta desconocida cae en index.html (Angular Router).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache largo para assets con hash (Angular les pone hash en el nombre).
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # index.html: nunca cachear (para que actualizaciones se vean al instante).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback: rutas de Angular Router caen en index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
